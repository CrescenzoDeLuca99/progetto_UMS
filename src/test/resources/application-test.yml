spring:
  # Il datasource in test viene sovrascritto dinamicamente da Testcontainers
  # tramite @DynamicPropertySource — questa configurazione è un placeholder.
  datasource:
    url: jdbc:postgresql://localhost:5432/usermanagement_test
    username: test
    password: test

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop

  data:
    redis:
      host: localhost  # overridden by DynamicPropertySource
      port: 6379       # overridden by DynamicPropertySource

  cache:
    type: redis

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

app:
  kafka:
    topics:
      user-events: user-events-test

logging:
  level:
    com.intesi.usermanagement: INFO
