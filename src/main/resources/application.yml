spring:
  application:
    name: user-management

  profiles:
    active: dev

  mvc:
    problemdetails:
      enabled: true

  jackson:
    # Serializza le date come stringhe ISO-8601, non come timestamp numerici
    serialization:
      write-dates-as-timestamps: false
    # Ignora campi sconosciuti nel JSON in ingresso invece di fallire
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
