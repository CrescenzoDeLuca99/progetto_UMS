services:

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ums-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8180'" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  keycloak-init:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ums-keycloak-init
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./keycloak/init-users.sh:/opt/keycloak/init-users.sh:ro
    entrypoint: [ "/bin/bash", "/opt/keycloak/init-users.sh" ]
    environment:
      KEYCLOAK_URL: http://keycloak:8180
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: ums-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-usermanagement}
      POSTGRES_USER: ${POSTGRES_USER:-usermgmt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-usermgmt}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usermgmt} -d ${POSTGRES_DB:-usermanagement}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    name: ums-postgres-data
